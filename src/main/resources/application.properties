spring.application.name=pagos
spring.profiles.default=local

# Flyway es el dueño del esquema: JPA solo valida, nunca lo modifica
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# JWT (HU-006): el secreto NO tiene default aquí — en producción llega por
# variable de entorno; local y test definen defaults inocuos en su perfil
pasarela.seguridad.jwt.minutos-expiracion=60
pasarela.seguridad.jwt.secreto=${PASARELA_JWT_SECRETO:}
pasarela.seguridad.admin.email=${PASARELA_ADMIN_EMAIL:}
pasarela.seguridad.admin.contrasena=${PASARELA_ADMIN_CONTRASENA:}
