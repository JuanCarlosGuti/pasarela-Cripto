# Perfil local: PostgreSQL de compose.yaml. Las credenciales vienen de .env
# (no versionado, ver .env.example) o de variables de entorno del sistema.
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pagos}
spring.datasource.username=${DB_USERNAME:pagos}
spring.datasource.password=${DB_PASSWORD}

management.endpoint.health.show-details=always

# Job de expiración (HU-014): activo en local; en tests se invoca directo
pasarela.pagos.expiracion.habilitada=true
pasarela.pagos.expiracion.milisegundos-intervalo=15000

# Job de reconciliación (HU-015): activo en local; en tests se invoca directo
pasarela.pagos.reconciliacion.habilitada=true
pasarela.pagos.reconciliacion.milisegundos-intervalo=30000
pasarela.pagos.reconciliacion.minutos-atascada=1

# Proveedor de pagos simulado (T-006): SOLO en local y test, jamás en prod
pasarela.proveedores.simulado.habilitado=true
pasarela.proveedores.simulado.secreto-webhook=${PASARELA_SIM_SECRETO_WEBHOOK:secreto-webhook-simulado-local}

# Límite de tasa en endpoints públicos (HU-022): por IP, ventana deslizante.
# En test está deshabilitado (los E2E del backend martillan login a
# propósito); la suite dedicada LimiteDeTasaApiTest lo enciende con límites
# chicos. El tope de login en local es más alto que el valor de referencia
# (10) porque el E2E de Playwright del front (repo hermano) corre desde la
# MISMA IP y su suite de regresión ya hace más de 10 logins reales en su
# ventana — un techo bajo aquí solo mide "cuántas historias tiene el front",
# no un riesgo real (localhost, un solo desarrollador). El valor de
# producción no vive aquí y no cambia.
pasarela.seguridad.limite-tasa.habilitado=true
pasarela.seguridad.limite-tasa.ventana-segundos=60
pasarela.seguridad.limite-tasa.login.maximo=60
pasarela.seguridad.limite-tasa.webhook.maximo=120
pasarela.seguridad.limite-tasa.consulta-publica.maximo=60

# Binance Pay real (HU-021): deshabilitado en local hasta tener el sandbox.
# Al habilitarlo, DESHABILITAR el simulador (solo un adaptador activo a la vez:
# ProcesarWebhookService inyecta UN ProveedorDePagoPort — ADR-003). Las
# credenciales jamás tienen default: sin variables de entorno, no arranca.
pasarela.proveedores.binance.habilitado=false
#pasarela.proveedores.binance.base-url=${BINANCE_BASE_URL}
#pasarela.proveedores.binance.api-key=${BINANCE_API_KEY}
#pasarela.proveedores.binance.secreto=${BINANCE_SECRET}
#pasarela.proveedores.binance.clave-publica-webhook=${BINANCE_WEBHOOK_PUBLIC_KEY}
#pasarela.proveedores.binance.moneda=COP

# Seguridad en desarrollo local: defaults inocuos, sobreescribibles por .env
pasarela.seguridad.jwt.secreto=${PASARELA_JWT_SECRETO:secreto-jwt-solo-para-desarrollo-local-nunca-en-produccion-0123456789}
pasarela.seguridad.admin.email=${PASARELA_ADMIN_EMAIL:admin@pasarela.local}
pasarela.seguridad.admin.contrasena=${PASARELA_ADMIN_CONTRASENA:admin-local-12345678}