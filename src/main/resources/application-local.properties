# Perfil local: PostgreSQL de compose.yaml. Defaults inocuos solo para desarrollo;
# en cualquier otro entorno las variables de entorno son obligatorias.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pagos}
spring.datasource.username=${DB_USERNAME:pagos}
spring.datasource.password=${DB_PASSWORD:pagos_local}

management.endpoint.health.show-details=always
