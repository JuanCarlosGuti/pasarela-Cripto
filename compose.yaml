services:
  postgres:
    image: postgres:17-alpine
    container_name: pagos-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-pagos}
      POSTGRES_USER: ${DB_USERNAME:-pagos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pagos_local}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pagos-datos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pagos-datos: